version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: blockshear-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blockshear
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build: .
    container_name: blockshear-api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/blockshear    
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEBUG=True
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend UI
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: blockshear-ui
    ports:
      - "5173:5173"
    environment:
      # React fetches from the browser running on the HOST machine, so it must point to HOST localhost!
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./ui:/app
      - /app/node_modules

volumes:
  postgres_data:

  postgres_data:
